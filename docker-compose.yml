services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - pipeline-net

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect-server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - pipeline-net
    healthcheck:
      test: [ "CMD-SHELL", "prefect server healthcheck || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect-deploy:
    build: .
    container_name: prefect-deploy
    depends_on:
      prefect-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    command: python pipeline/deploy.py
    networks:
      - pipeline-net

  prefect-worker:
    build: .
    container_name: prefect-worker
    depends_on:
      prefect-server:
        condition: service_healthy
      prefect-deploy:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    command: prefect worker start --pool "default-agent-pool"
    networks:
      - pipeline-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - pipeline-net

  api:
    build: .
    container_name: terceirizados-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/pipeline
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    command: python api/main.py
    networks:
      - pipeline-net
    depends_on:
      - minio
      - jaeger

volumes:
  minio_data:
  prefect_data:


networks:
  pipeline-net:
    driver: bridge
